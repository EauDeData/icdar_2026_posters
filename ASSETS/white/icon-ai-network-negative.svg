<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Network edges -->
  <g stroke="#F6F4F4" stroke-width="8" fill="none">
    <line x1="60" y1="60" x2="120" y2="120"/>
    <line x1="180" y1="60" x2="120" y2="120"/>
    <line x1="60" y1="180" x2="120" y2="120"/>
    <line x1="180" y1="180" x2="120" y2="120"/>
    <line x1="120" y1="30" x2="120" y2="120"/>
    <line x1="210" y1="120" x2="120" y2="120"/>
  </g>
  <!-- Outer nodes -->
  <circle cx="60" cy="60" r="20" fill="#fff5eb"/>
  <circle cx="180" cy="60" r="20" fill="#fff5eb"/>
  <circle cx="60" cy="180" r="20" fill="#fff5eb"/>
  <circle cx="180" cy="180" r="20" fill="#fff5eb"/>
  <circle cx="120" cy="30" r="16" fill="#fff5eb"/>
  <circle cx="210" cy="120" r="16" fill="#fff5eb"/>
  <!-- Central node -->
  <circle cx="120" cy="120" r="28" fill="#fff5eb"/>
</svg>
